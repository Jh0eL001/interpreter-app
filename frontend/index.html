<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLS Quick Interpreter Dictionary</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app-container">
    <header>
      <h1>⚡LLS Interpreter Dictionary</h1>
    </header>

    <main>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar término, acrónimo o traducción..." autofocus
          autocomplete="off">
      </div>

      <div id="filter-container">
        <div id="macro-categories" class="pill-row"></div>
        <div id="sub-scenarios" class="pill-row hidden"></div>
      </div>

      <div id="results-container" class="results-list">
        <p class="placeholder-text">Cargando glosario en memoria...</p>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
